<style>

    --ink: #1E2A3A;

  .card{

  }

  label.field-label{
    display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft);
    text-transform:uppercase; letter-spacing:.04em; margin: 14px 0 6px;
  }
  input[type=text]{
    width:100%; padding:13px 14px; border-radius:12px; border:1.5px solid var(--line);

    appearance:none; border:none; cursor:pointer;
    font-family:var(--font-body); font-weight:700; font-size:15.5px;
    border-radius:14px; padding:14px 18px;
    display:flex; align-items:center; justify-content:center; gap:8px;

  .btn-primary:hover{ background: var(--brand-dark); }

  .btn-ghost{ background:transparent; color:var(--ink-soft); font-weight:600; }
  .btn-ghost:hover{ color:var(--ink); }

</style>

function toast(msg){

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// SCORING

function computeVak(answers){
  let v=0,a=0,k=0;
  answers.forEach(idx=>{ if(idx===0)v++; else if(idx===1)a++; else if(idx===2)k++; });
  let dominan;
  const arr=[v,a,k];
  const max=Math.max(...arr);
  const spread = Math.max(...arr)-Math.min(...arr);
  const countMax = arr.filter(x=>x===max).length;
  if(spread<=2) dominan="Seimbang / Multimodal";
  else if(countMax>1) dominan="Campuran";
  else dominan = ["Visual","Auditori","Kinestetik"][arr.indexOf(max)];
  return {visual:v, auditori:a, kinestetik:k, dominan};
}

function computeAbility(answers){
  const groups = {Bahasa:[0,4], Numerik:[5,9], Penalaran:[10,14]};
  const scores = {};
  for(const key in groups){
    const [s,e] = groups[key];
    let correct=0, total=0;
    for(let i=s;i<=e;i++){ total++; if(answers[i]===ABILITY_ITEMS[i].correct) correct++; }
    scores[key] = Math.round((correct/total)*100);
  }
  const total = Math.round((scores.Bahasa+scores.Numerik+scores.Penalaran)/3);
  let kategori, kcolor;
  if(total>=80){kategori="Tinggi"; kcolor="var(--good)";}
  else if(total>=60){kategori="Sedang"; kcolor="var(--warn)";}
  else if(total>=40){kategori="Perlu Pendampingan"; kcolor="#E08A3C";}
  else {kategori="Perlu Pendampingan Intensif"; kcolor="var(--bad)";}
  return {...scores, total, kategori, kcolor};
}

async function saveSubmission(data){
  const id = Date.now()+"-"+Math.random().toString(36).slice(2,8);
  try{
    await window.storage.set("submission:"+id, JSON.stringify(data), true);
    return true;
  }catch(e){
    console.error("storage error", e);
    return false;
  }
}

async function loadAllSubmissions(){
  const out = [];
  try{
    const listRes = await window.storage.list("submission:", true);
    const keys = (listRes && listRes.keys) || [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, true);
        if(r && r.value) out.push({key:k, data: JSON.parse(r.value)});
      }catch(e){ /* skip unreadable entry */ }
    }
  }catch(e){
    console.error("list error", e);
  }
  out.sort((a,b)=> (b.data.timestamp||0) - (a.data.timestamp||0));
  return out;
}

async function deleteSubmission(key){
  try{ await window.storage.delete(key, true); return true; }
  catch(e){ return false; }
}

const SUBTES_COLOR = {Bahasa:"var(--visual)", Numerik:"var(--audit)", Penalaran:"var(--kines)"};

function renderAbility(){
  const i = state.abilityIndex;
  const item = ABILITY_ITEMS[i];
  const pct = Math.round((i/ABILITY_ITEMS.length)*100);
  const chosen = state.abilityAnswers[i];
  const showPassage = item.subtes==="Bahasa";

  root.innerHTML = `
    <div class="shell">
      ${brandbar("Bagian 2: Kemampuan Belajar")}
      <div class="card">
        <div class="progress-wrap">
          <div class="progress-top">
            <span class="progress-label">Subtes ${esc(item.subtes)}</span>
            <span class="progress-count">${i+1} / ${ABILITY_ITEMS.length}</span>
          </div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%; background:${SUBTES_COLOR[item.subtes]};"></div></div>
        </div>
        ${showPassage ? `<div class="passage-box" style="margin-bottom:16px;"><span class="passage-tag">Ingat cerita Rani</span>${esc(PASSAGE)}</div>` : ""}
        <span class="q-eyebrow" style="background:${SUBTES_COLOR[item.subtes]};">${esc(item.subtes)}</span>
        <p class="q-text">${esc(item.q)}</p>
        <div id="opts">
          ${item.opts.map((op,idx)=>`
            <div class="opt ${chosen===idx?'selected':''}" data-idx="${idx}">
              <span class="opt-dot"></span><span>${esc(op)}</span>
            </div>`).join("")}
        </div>
        <div class="btn-row">
          <button class="btn btn-ghost" id="btn-back" style="flex:0 0 auto; width:auto; padding:14px 18px;" ${i===0?'disabled':''}>\u2190 Kembali</button>
          <button class="btn btn-primary" id="btn-next" ${chosen===null?'disabled':''}>${i===ABILITY_ITEMS.length-1? "Selesai & Lihat Hasil \u2192" : "Berikutnya \u2192"}</button>
        </div>
      </div>
    </div>
  `;
  root.querySelectorAll(".opt").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.abilityAnswers[i] = parseInt(el.dataset.idx,10);
      render();
    });
  });
  document.getElementById("btn-back").addEventListener("click", ()=>{
    if(i>0){ state.abilityIndex--; render(); }
  });
  document.getElementById("btn-next").addEventListener("click", async ()=>{
    if(state.abilityAnswers[i]===null) return;
    if(i===ABILITY_ITEMS.length-1){
      await finishTest();
    } else { state.abilityIndex++; render(); }
  });
}

async function finishTest(){
  const vak = computeVak(state.vakAnswers);
  const ability = computeAbility(state.abilityAnswers);
  const result = {
    nama: state.nama, kelas: state.kelas, timestamp: Date.now(),
    vak, ability
  };
  state.result = result;
  root.innerHTML = `<div class="shell"><div class="card"><p class="lede">Menyimpan hasil...</p></div></div>`;
  await saveSubmission(result);
  state.view="result";
  render();
}

function donutGradient(v,a,k){
  const total = v+a+k || 1;
  const pv = v/total*360, pa = a/total*360, pk = k/total*360;
  const c1 = pv, c2 = pv+pa;
  return `conic-gradient(var(--visual) 0deg ${c1}deg, var(--audit) ${c1}deg ${c2}deg, var(--kines) ${c2}deg 360deg)`;
}

function downloadPdf(r){
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:"pt", format:"a4"});
    const margin = 48; let y = margin;
    doc.setFont("helvetica","bold"); doc.setFontSize(18);
    doc.text("Hasil Tes Diagnostik Siswa", margin, y); y+=26;
    doc.setDrawColor(225,232,240); doc.line(margin,y,545,y); y+=22;

    doc.setFontSize(11); doc.setFont("helvetica","normal");
    doc.text(`Nama Siswa : ${r.nama}`, margin, y); y+=16;
    doc.text(`Kelas      : ${r.kelas}`, margin, y); y+=16;
    doc.text(`Tanggal    : ${new Date(r.timestamp).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}`, margin, y); y+=28;

    doc.setFont("helvetica","bold"); doc.setFontSize(13);
    doc.text("1. Gaya Belajar (VAK)", margin, y); y+=18;
    doc.setFont("helvetica","normal"); doc.setFontSize(11);
    doc.text(`Skor Visual: ${r.vak.visual} / 15   Auditori: ${r.vak.auditori} / 15   Kinestetik: ${r.vak.kinestetik} / 15`, margin, y); y+=16;
    doc.setFont("helvetica","bold");
    doc.text(`Gaya Belajar Dominan: ${r.vak.dominan}`, margin, y); y+=16;
    doc.setFont("helvetica","normal");
    const recLines = doc.splitTextToSize(`Saran: ${REKOMENDASI[r.vak.dominan]}`, 497);
    doc.text(recLines, margin, y); y += recLines.length*14 + 18;

    doc.setFont("helvetica","bold"); doc.setFontSize(13);
    doc.text("2. Kemampuan Belajar Dasar", margin, y); y+=18;
    doc.setFont("helvetica","normal"); doc.setFontSize(11);
    doc.text(`Skor Bahasa   : ${r.ability.Bahasa}`, margin, y); y+=16;
    doc.text(`Skor Numerik  : ${r.ability.Numerik}`, margin, y); y+=16;
    doc.text(`Skor Penalaran: ${r.ability.Penalaran}`, margin, y); y+=16;
    doc.setFont("helvetica","bold");
    doc.text(`Skor Total    : ${r.ability.total}  (${r.ability.kategori})`, margin, y); y+=28;

    doc.setFontSize(9); doc.setFont("helvetica","italic"); doc.setTextColor(120,120,120);
    doc.text("Dokumen ini dihasilkan otomatis oleh aplikasi Tes Diagnostik Siswa SD.", margin, 780);

    doc.save(`Hasil-Tes-${r.nama.replace(/\s+/g,'_')}.pdf`);
  }catch(e){
    console.error(e);
    toast("Gagal membuat PDF. Coba lagi.");
  }
}

// ---------------------------------------------------------------
// RENDER: ADMIN DASHBOARD
// ---------------------------------------------------------------
async function loadAdmin(){
  state.adminLoading = true; state.adminError="";
  renderAdminTable();
  const data = await loadAllSubmissions();
  state.adminData = data;
  state.adminLoading = false;
  renderAdminTable();
}

function renderAdminTable(){
  const wrap = document.getElementById("admin-body");
  if(!wrap) return;
  if(state.adminLoading){
    wrap.innerHTML = `<div class="empty-state">Memuat data...</div>`;
    return;
  }
  const rows = state.adminData;
  const n = rows.length;
  const avg = n? Math.round(rows.reduce((s,x)=>s+x.data.ability.total,0)/n) : 0;
  const dominanCount = {};
  rows.forEach(x=>{ const d=x.data.vak.dominan; dominanCount[d]=(dominanCount[d]||0)+1; });
  const topDominan = Object.keys(dominanCount).sort((a,b)=>dominanCount[b]-dominanCount[a])[0] || "-";

  let html = `
    <div class="stat-grid">
      <div class="stat-card"><b>${n}</b><span>Siswa Mengisi</span></div>
      <div class="stat-card"><b>${n?avg:'-'}</b><span>Rata-rata Skor</span></div>
      <div class="stat-card" style="overflow:hidden;"><b style="font-size:14px;">${esc(topDominan)}</b><span>Gaya Terbanyak</span></div>
    </div>
  `;
  if(n===0){
    html += `<div class="empty-state">Belum ada siswa yang mengisi tes.<br>Bagikan tautan aplikasi ini kepada siswa untuk memulai.</div>`;
  } else {
    html += `<div class="admin-table-wrap"><table class="admin">
      <thead><tr><th>Nama</th><th>Kelas</th><th>Gaya Belajar</th><th>Bahasa</th><th>Numerik</th><th>Penalaran</th><th>Total</th><th>Kategori</th><th>Tanggal</th><th></th></tr></thead>
      <tbody>
      ${rows.map(x=>{
        const d = x.data;
        return `<tr>
          <td>${esc(d.nama)}</td>
          <td>${esc(d.kelas)}</td>
          <td>${esc(d.vak.dominan)}</td>
          <td>${d.ability.Bahasa}</td>
          <td>${d.ability.Numerik}</td>
          <td>${d.ability.Penalaran}</td>
          <td><b>${d.ability.total}</b></td>
          <td><span class="pill" style="background:${d.ability.kcolor}22; color:${d.ability.kcolor};">${esc(d.ability.kategori)}</span></td>
          <td>${new Date(d.timestamp).toLocaleDateString('id-ID')}</td>
          <td><button class="btn btn-ghost btn-sm" data-key="${esc(x.key)}" data-del="1">Hapus</button></td>
        </tr>`;
      }).join("")}
      </tbody>
    </table></div>`;
  }
  wrap.innerHTML = html;

  wrap.querySelectorAll("[data-del]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(!confirm("Hapus data siswa ini?")) return;
      await deleteSubmission(btn.dataset.key);
      toast("Data dihapus.");
      loadAdmin();
    });
  });
}

function exportCsv(){
  const rows = state.adminData;
  const header = ["Nama","Kelas","Gaya Belajar Dominan","Skor Visual","Skor Auditori","Skor Kinestetik","Skor Bahasa","Skor Numerik","Skor Penalaran","Skor Total","Kategori","Tanggal"];
  const lines = [header.join(",")];
  rows.forEach(x=>{
    const d = x.data;
    const vals = [d.nama, d.kelas, d.vak.dominan, d.vak.visual, d.vak.auditori, d.vak.kinestetik,
      d.ability.Bahasa, d.ability.Numerik, d.ability.Penalaran, d.ability.total, d.ability.kategori,
      new Date(d.timestamp).toLocaleDateString('id-ID')];
    lines.push(vals.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
  });
  const blob = new Blob(["\uFEFF"+lines.join("\r\n")], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "rekap-hasil-tes-diagnostik.csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderAdmin(){
  root.innerHTML = `
    <div class="shell">
      ${brandbar("Area Guru")}
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;">
          <h1 class="hero" style="font-size:20px; margin:0;">Rekap Hasil Siswa</h1>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-outline btn-sm" id="btn-refresh">\u21BB Muat Ulang</button>
            <button class="btn btn-primary btn-sm" id="btn-csv">\u2B07 Unduh CSV</button>
          </div>
        </div>
        <div id="admin-body"></div>
        <div class="link-row"><button id="btn-logout">\u2190 Keluar dari area guru</button></div>
      </div>
    </div>
  `;
  renderAdminTable();
  document.getElementById("btn-refresh").addEventListener("click", loadAdmin);
  document.getElementById("btn-csv").addEventListener("click", exportCsv);
  document.getElementById("btn-logout").addEventListener("click", ()=>{ state.view="home"; render(); });
}

// ---------------------------------------------------------------
// ROUTER
// ---------------------------------------------------------------
function render(){
  window.scrollTo(0,0);
  if(state.view==="home") renderHome();
  else if(state.view==="vak") renderVak();
  else if(state.view==="passage") renderPassage();
  else if(state.view==="ability") renderAbility();
  else if(state.view==="result") renderResult();
  else if(state.view==="admin-login") renderAdminLogin();
  else if(state.view==="admin") renderAdmin();
}

render();
})();
